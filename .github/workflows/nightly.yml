---
  name: Nightly check

  on:
    schedule:
      - cron: "0 0 * * *"
    workflow_dispatch: {}

  concurrency:
    group: nightly-${{ github.ref }}
    cancel-in-progress: true

  jobs:
    linkCheck:
      name: Run link check
      runs-on: ubuntu-latest
      permissions:
        contents: read
      steps:
        - name: Checkout repository
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

        - name: LinkCheck
          uses: ConsenSys/github-actions/docs-link-check@979fb3e168f8f7af5e59378a02420c8f6fc4a6a9 # main
          with:
            CONFIG_FILE: .linkspector.yml

    slackNotification:
      needs: linkCheck
      if: ${{ failure() }}
      runs-on: ubuntu-latest
      steps:
        - name: Debug secret
          run: |
            if [ -n "${{ secrets.SLACK_WEBHOOK }}" ]; then
              echo "SLACK_WEBHOOK is set"
            else
              echo "SLACK_WEBHOOK is empty"
            fi

        - name: Slack Notification
          uses: ConsenSys/github-actions/slack-notify@979fb3e168f8f7af5e59378a02420c8f6fc4a6a9 # main
          env:
            SLACK_CHANNEL: doc-ci-alerts
            SLACK_COLOR: danger
            SLACK_TITLE: Web3Signer docs nightly build - Failure
            SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
            MSG_MINIMAL: true